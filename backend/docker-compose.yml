services:
  planner-backend:
    build: .
    container_name: planner-backend
    environment:
      ENV: production
      API_SECRET: ${API_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMOJI_MODEL: ${OPENAI_EMOJI_MODEL}
      OPENAI_TASK_MODEL: ${OPENAI_TASK_MODEL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      APPLE_ICLOUD_EMAIL: ${APPLE_ICLOUD_EMAIL}
      APPLE_ICLOUD_APP_PASSWORD: ${APPLE_ICLOUD_APP_PASSWORD}
      APPLE_CALDAV_URL: ${APPLE_CALDAV_URL:-https://caldav.icloud.com}
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped
    networks:
      - creditcycle-net

networks:
  creditcycle-net:
    external: true
    name: credit-cycle-app_creditcycle-net
